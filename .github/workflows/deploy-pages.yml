name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages. This is independent
# of Lovable: Lovable keeps deploying main with base "/", while this workflow
# builds with GITHUB_PAGES=true so the app works under /runi-exchange/.
#
# One-time setup in the repo: Settings → Pages → Build and deployment →
# Source → "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: SPA fallback
        # GitHub Pages serves 404.html for unknown paths; reusing index.html
        # lets React Router (BrowserRouter) handle deep links like /browse.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
